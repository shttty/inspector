name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile backend/app/app.py
          python -m py_compile backend/app/encrypt.py
          python -m py_compile backend/app/auth.py
          python -m py_compile backend/app/node_link.py
          python -m py_compile backend/app/permission.py
          python -m py_compile backend/app/model/serverinfo.py
          python -m py_compile backend/app/model/userinfo.py

      - name: Build Docker image
        run: docker build -t inspector-backend-ci backend/
