services:
  db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: changeme
      MARIADB_DATABASE: inspector
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
