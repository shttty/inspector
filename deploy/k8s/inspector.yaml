apiVersion: v1
kind: Service
metadata:
  name: inspector
spec:
  selector:
    app: inspector
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspector
  labels:
    app: inspector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inspector
  template:
    metadata:
      labels:
        app: inspector
    spec:
      containers:
        - name: inspector
          image: irisrinne/inspector
          ports:
            - containerPort: 5000
          command:
            - "/usr/local/bin/gunicorn"
            - "app:app"
            - "-c" 
            - "gunicorn.conf.py"
---
apiVersion: v1
kind: Service
metadata:
  name: inspector-web-service
  labels:
    app: inspector
spec:
  selector:
    app: inspector-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspector-web
  labels:
    app: inspector-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inspector-web
  template:
    metadata:
      labels:
        app: inspector-web
    spec:
      containers:
      - name: inspector-web
        image: irisrinne/inspector-web:latest
        ports:
        - containerPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
spec:
  selector:
    matchLabels:
      app: mariadb
  serviceName: mariadb
  replicas: 1
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: 123qwe
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          
  volumes:
  - name: mysql-storage
    persistentVolumeClaim:
      claimName: mypvc
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
spec:
  clusterIP: None
  selector:
    app: mariadb
  ports:
    - port: 8181
      targetPort: 3306